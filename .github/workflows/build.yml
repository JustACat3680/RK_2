on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Установка зависимостей
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake gcc g++ clang
    - name: Конфигурация
      run: |
        cmake -B build
    - name: Сборка
      run: |
        cmake --build build
